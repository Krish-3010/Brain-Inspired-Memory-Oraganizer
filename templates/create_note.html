<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Create a new note in Brain Inspired Memory Organizer — write a note on wobbly ledger paper."/>
  <title>Write Note — Brain Organizer</title>
  
  <link rel="stylesheet" href="/static/style.css">

  <style>
    .create-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 16px 80px;
    }

    .page-header {
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-header h1 svg {
      color: var(--accent-red);
    }

    .char-count {
      text-align: right;
      font-size: 0.9rem;
      color: rgba(45, 45, 45, 0.4);
      margin-top: 4px;
      margin-bottom: 12px;
      font-family: var(--font-heading);
    }
    .dark-theme .char-count {
      color: rgba(244, 239, 230, 0.4);
    }
    .char-count.warn {
      color: var(--accent-red) !important;
      text-decoration: underline;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .form-actions .btn {
      flex: 1;
    }

    /* Tips clipboard sticky tag */
    .tips-sticky {
      background-color: var(--bg-postit);
      border: 3px solid var(--color-border);
      border-radius: var(--wobbly-md);
      padding: 18px 22px;
      box-shadow: 4px 4px 0px var(--color-border);
      margin-top: 32px;
      position: relative;
      transform: rotate(-1deg);
    }

    .tips-sticky::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 30px;
      width: 50px;
      height: 16px;
      background-color: var(--tape-color);
      border: 1px dashed var(--tape-border);
      transform: rotate(4deg);
    }

    .tips-sticky h4 {
      font-size: 1.15rem;
      color: var(--fg-lead);
      margin-bottom: 8px;
    }

    .tips-sticky ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tips-sticky li {
      font-size: 1.15rem;
      color: var(--fg-lead);
      display: flex;
      gap: 8px;
    }

    .tips-sticky li::before {
      content: '→';
      color: var(--accent-red);
      font-weight: 700;
    }

    .shortcut-desc {
      font-size: 1rem;
      color: rgba(45, 45, 45, 0.5);
    }
    .dark-theme .shortcut-desc {
      color: rgba(244, 239, 230, 0.5);
    }
    .key-cap {
      border: 1.5px solid var(--color-border);
      padding: 1px 5px;
      border-radius: 4px;
      background-color: var(--bg-muted);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="nav-wrapper">
    <nav>
      <a class="nav-logo" href="/">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
        </svg>
        <span>Brain Organizer</span>
      </a>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </div>

  <div class="nav-spacer"></div>

  <!-- Main creation area -->
  <div class="create-wrap">
    <div class="page-header">
      <div>
        <h1>
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Create Note
        </h1>
        <p>Record notes inside your private memory space.</p>
      </div>
      <div class="shortcut-desc">
        Press <span class="key-cap">Ctrl</span> + <span class="key-cap">S</span> to commit
      </div>
    </div>

    <!-- Notebook ledger sheet -->
    <div class="sketch-card notebook-paper">
      
      <div class="input-wrap">
        <label for="noteTitle">Note Title</label>
        <input id="noteTitle" class="input" placeholder="Give your note a title..." maxlength="100" oninput="updateLimit('noteTitle', 'titleCount', 100)">
        <div class="char-count" id="titleCount">0 / 100</div>
      </div>

      <div class="input-wrap">
        <label for="noteContent">Detailed Content</label>
        <textarea id="noteContent" class="input" rows="8" placeholder="Start writing here... Write descriptions, details, or logs." maxlength="5000" oninput="updateLimit('noteContent', 'contentCount', 5000)"></textarea>
        <div class="char-count" id="contentCount">0 / 5000</div>
      </div>

      <div class="form-actions">
        <button class="btn" id="saveBtn" onclick="saveNote()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
          <span id="saveBtnText">Save Note</span>
        </button>
        <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
        <button class="btn btn-secondary" onclick="location.href='/notes'">Archive</button>
      </div>

    </div>

    <!-- Sticky Notes Tip section -->
    <div class="tips-sticky">
      <h4>🧠 Note Tips</h4>
      <ul>
        <li>Write unique titles to search for them easily.</li>
        <li>Put all details inside the note so you can consult them later.</li>
        <li>Keep one note per topic.</li>
      </ul>
    </div>

  </div>

  <script src="/static/script.js"></script>
  <script>
    buildNavbar('create');

    // Enforce login
    if (!getUser()) {
      toast('Please login to edit notes.', 'info');
      setTimeout(() => location.href = '/auth', 1200);
    }

    function updateLimit(id, limitId, max) {
      const len = document.getElementById(id).value.length;
      const counter = document.getElementById(limitId);
      counter.textContent = `${len} / ${max}`;
      counter.classList.toggle('warn', len > max * 0.88);
    }

    function clearForm() {
      document.getElementById('noteTitle').value = '';
      document.getElementById('noteContent').value = '';
      document.getElementById('titleCount').textContent = '0 / 100';
      document.getElementById('contentCount').textContent = '0 / 5000';
      toast('Notebook form cleared.', 'info');
    }

    async function saveNote() {
      const title = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();
      if (!title) { toast('Please specify a title.', 'error'); return; }
      if (!content) { toast('Note content cannot be empty.', 'error'); return; }

      const btn = document.getElementById('saveBtn');
      const txt = document.getElementById('saveBtnText');
      btn.disabled = true;
      txt.textContent = 'Saving...';

      try {
        const res = await fetch('/save_note', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ title, content })
        });
        const data = await res.json();
        if (data.status === 'success') {
          toast('Note saved to notebook!', 'success');
          setTimeout(() => location.href = '/notes', 900);
        } else {
          toast(data.message || 'Failed to commit card.', 'error');
          btn.disabled = false;
          txt.textContent = 'Save Note';
        }
      } catch {
        toast('Connection interruption during save transaction.', 'error');
        btn.disabled = false;
        txt.textContent = 'Save Note';
      }
    }

    // Ctrl+S key combination support
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveNote();
      }
    });
  </script>
</body>
</html>
