<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Ask questions about your notes — consult your wobbly hand-sketched memory notebook."/>
  <title>Consult Brain — Brain Organizer</title>
  
  <link rel="stylesheet" href="/static/style.css">

  <style>
    .ask-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 32px;
      position: relative;
    }

    /* Hand-sketched brain SVG pulsator */
    .brain-pulsator-wrapper {
      position: relative;
      display: inline-flex;
      margin-bottom: 16px;
    }

    .brain-pulsator-svg {
      width: 110px;
      height: 110px;
      color: var(--accent-red);
      animation: sketchBrainPulse 3s infinite ease-in-out;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .brain-pulsator-svg:hover {
      transform: scale(1.1) rotate(5deg);
    }

    @keyframes sketchBrainPulse {
      0%, 100% { transform: scale(1) rotate(-1deg); }
      50% { transform: scale(1.06) rotate(2deg); }
    }

    .chips-label {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--fg-lead);
      margin-top: 18px;
      margin-bottom: 10px;
      font-family: var(--font-heading);
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: var(--wobbly);
      border: 2px solid var(--color-border);
      background-color: var(--bg-muted);
      color: var(--fg-lead);
      font-family: var(--font-body);
      font-size: 1.15rem;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.2s ease;
      box-shadow: 2px 2px 0px var(--color-border);
    }

    .chip:hover {
      background-color: var(--bg-postit);
      transform: translate(1px, 1px) rotate(1deg);
      box-shadow: 1px 1px 0px var(--color-border);
    }
    .chip:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--color-border);
    }

    /* Results */
    #answerBox {
      display: none;
      margin-top: 36px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      border-bottom: 3px dashed var(--color-border);
      padding-bottom: 10px;
    }

    .results-header h2 {
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .results-header h2 svg {
      color: var(--accent-blue);
    }

    /* Hand drawn result cards */
    .result-card-sketch {
      background-color: var(--bg-card);
      border: 3px solid var(--color-border);
      border-radius: var(--wobbly-card);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 4px 4px 0px var(--color-border);
      position: relative;
      transform: rotate(calc(var(--r, 0) * 1deg));
      transition: transform 0.15s ease;
    }

    .result-card-sketch:hover {
      transform: rotate(0deg) scale(1.01);
    }

    .result-header-sketch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 12px;
    }

    .result-title {
      font-family: var(--font-heading);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--fg-lead);
    }

    .match-score-badge {
      font-family: var(--font-heading);
      font-size: 1.05rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: var(--wobbly);
      background-color: var(--bg-postit);
      color: var(--fg-lead);
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0px var(--color-border);
      white-space: nowrap;
    }

    .result-content {
      font-size: 1.2rem;
      color: var(--fg-lead);
      opacity: 0.9;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Sketchy loading dots */
    .thinking-box {
      text-align: center;
      padding: 40px 16px;
      background-color: var(--bg-card);
      border: 3px dashed var(--color-border);
      border-radius: var(--wobbly-card);
      box-shadow: 4px 4px 0px var(--color-border);
    }

    .sketchy-dots span {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--color-border);
      border-radius: var(--wobbly-circle);
      background-color: var(--accent-red);
      margin: 0 4px;
      animation: sketchDotBounce 1.2s infinite ease-in-out;
    }

    .sketchy-dots span:nth-child(2) {
      animation-delay: 0.2s;
      background-color: var(--accent-blue);
    }

    .sketchy-dots span:nth-child(3) {
      animation-delay: 0.4s;
      background-color: var(--bg-postit);
    }

    @keyframes sketchDotBounce {
      0%, 80%, 100% { transform: translateY(0) scale(1); }
      40% { transform: translateY(-12px) scale(1.1); }
    }
  </style>
</head>
<body>
  <!-- Floating Header -->
  <div class="nav-wrapper">
    <nav>
      <a class="nav-logo" href="/">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
        </svg>
        <span>Brain Organizer</span>
      </a>
      <div class="nav-links" id="navLinks"></div>
    </nav>
  </div>

  <div class="nav-spacer"></div>

  <!-- Main Q&A Content area -->
  <div class="ask-wrap">
    
    <div class="page-header">
      <div class="brain-pulsator-wrapper">
        <!-- Sketch style hand outline brain SVG -->
        <svg class="brain-pulsator-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
        </svg>
      </div>
      
      <h1 class="section-title">Ask Your Brain</h1>
      <p class="section-desc" style="margin: 0 auto 20px;">Submit natural language questions. The lookup engine searches your notes to return related context.</p>
    </div>

    <!-- Sketched search box clipboard -->
    <div class="sketch-card">
      <div class="input-wrap">
        <label for="questionInput">Your Query</label>
        <textarea id="questionInput" class="input" placeholder="e.g. What notes did I make about python? What are my meeting details?"></textarea>
      </div>

      <div class="chips-label">Quick Links</div>
      <div class="example-chips">
        <button class="chip" onclick="setQuery('What do I know about Python?')">Python Knowledge</button>
        <button class="chip" onclick="setQuery('Tell me about my project ideas')">Project Ideas</button>
        <button class="chip" onclick="setQuery('What are my goals?')">My Goals</button>
      </div>

      <div style="display: flex; gap: 12px; margin-top: 10px;">
        <button class="btn" id="askBtn" onclick="askQuestion()" style="flex: 1.8;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <span id="askBtnText">Search My Notes</span>
        </button>
        <button class="btn btn-secondary" onclick="clearResults()" style="flex: 0.8;">Clear</button>
      </div>
    </div>

    <!-- Results Box -->
    <div id="answerBox"></div>

  </div>

  <script src="/static/script.js"></script>
  <script>
    buildNavbar('question');

    function setQuery(text) {
      document.getElementById('questionInput').value = text;
      document.getElementById('questionInput').focus();
    }

    function clearResults() {
      document.getElementById('questionInput').value = '';
      const box = document.getElementById('answerBox');
      box.style.display = 'none';
      box.innerHTML = '';
      toast('Consult card cleared.', 'info');
    }

    async function askQuestion() {
      const q = document.getElementById('questionInput').value.trim();
      const box = document.getElementById('answerBox');
      if (!q) { toast('Please input a question.', 'error'); return; }

      const btn = document.getElementById('askBtn');
      const txt = document.getElementById('askBtnText');
      btn.disabled = true;
      txt.textContent = 'Searching...';

      box.style.display = 'block';
      box.innerHTML = `
        <div class="thinking-box">
          <div class="sketchy-dots">
            <span></span><span></span><span></span>
          </div>
          <p style="margin-top:16px; font-weight:700;">Searching through your memories...</p>
        </div>`;

      try {
        const res = await fetch('/ask_question', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ question: q })
        });
        const data = await res.json();

        if (data.status === 'error') {
          box.innerHTML = `
            <div class="sketch-card" style="border-color:var(--accent-red); text-align:center; padding:32px;">
              <p style="color:var(--accent-red); font-weight:700;">⚠️ Request Rejected: ${escapeHtml(data.message)}</p>
              ${data.message.includes('Login') ? '<button class="btn btn-sm" style="margin-top:16px" onclick="location.href=\'/auth\'">Go to Login</button>' : ''}
            </div>`;
          btn.disabled = false;
          txt.textContent = 'Search My Notes';
          return;
        }

        const results = data.results || [];
        if (results.length === 0) {
          box.innerHTML = `
            <div class="sketch-card" style="text-align:center; padding:40px;">
              <div style="font-size:2.5rem; margin-bottom:12px;">🔍</div>
              <p style="font-weight:700; margin-bottom:6px;">No card matches found for:</p>
              <p style="color:var(--accent-blue); font-style:italic;">"${escapeHtml(q)}"</p>
              <p style="font-size:0.95rem; opacity:0.6; margin-top:16px;">Try using simple keyword matches or writing more note content.</p>
            </div>`;
          btn.disabled = false;
          txt.textContent = 'Search My Notes';
          return;
        }

        let html = `
          <div class="results-header">
            <h2>
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              Matched Cards
            </h2>
            <span class="notes-count-badge">${results.length} match${results.length > 1 ? 'es' : ''}</span>
          </div>`;

        // Decorative styles list for matches
        const decors = ['decoration-tape', 'decoration-tack', ''];
        const colors = ['', 'postit-yellow', ''];

        results.forEach((r, i) => {
          const decor = decors[i % decors.length];
          const color = colors[i % colors.length];
          const rVal = ((i * 11) % 5) - 2; // slight rotation offsets

          const percentage = Math.round(r.score * 100);
          
          html += `
            <div class="sketch-card result-card-sketch ${decor} ${color}" style="--r:${rVal}">
              <div class="result-header-sketch">
                <div class="result-title">${escapeHtml(r.title)}</div>
                <div class="match-score-badge">Match ${percentage}%</div>
              </div>
              <div class="result-content">${escapeHtml(r.content)}</div>
            </div>`;
        });

        box.innerHTML = html;
      } catch {
        box.innerHTML = `
          <div class="sketch-card" style="text-align:center; color:var(--accent-red); padding:32px;">
            ⚠️ Connection anomaly. Verify endpoint availability.
          </div>`;
      }
      btn.disabled = false;
      txt.textContent = 'Search My Notes';
    }

    // Ctrl+Enter keyboard listener
    document.getElementById('questionInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        askQuestion();
      }
    });
  </script>
</body>
</html>
