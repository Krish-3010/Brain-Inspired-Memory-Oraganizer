<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Login or create an account for Brain Inspired Memory Organizer — Your personal hand-sketched notebook organizer."/>
  <title>Brain Inspired Memory Organizer — Auth</title>
  
  <link rel="stylesheet" href="/static/style.css">

  <style>
    .auth-wrap {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px 60px;
    }

    .auth-clipboard {
      background-color: var(--bg-card);
      border: 4px solid var(--color-border);
      border-radius: var(--wobbly-card);
      padding: 40px 30px 30px;
      width: 100%;
      max-width: 440px;
      box-shadow: 8px 8px 0px var(--color-border);
      position: relative;
    }

    /* Clipboard top clip decoration */
    .auth-clipboard::before {
      content: '';
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background-color: var(--bg-muted);
      border: 3px solid var(--color-border);
      border-radius: 4px 4px 12px 12px;
      box-shadow: 2px 2px 0px var(--color-border);
      z-index: 5;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-header h2 {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    .auth-header p {
      font-size: 1.15rem;
      opacity: 0.8;
    }

    /* Tab Switch row */
    .tab-row {
      display: flex;
      border: 3px solid var(--color-border);
      border-radius: var(--wobbly-md);
      padding: 4px;
      margin-bottom: 28px;
      background-color: var(--bg-page);
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border-radius: var(--wobbly);
      border: none;
      background: transparent;
      color: var(--fg-lead);
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .tab-btn.active {
      background-color: var(--accent-red);
      color: #ffffff;
      border: 2px solid var(--color-border);
      box-shadow: 2px 2px 0px var(--color-border);
      transform: rotate(-1deg);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .input-icon-container {
      position: relative;
    }

    .input-icon-container .input {
      padding-left: 44px;
    }

    .password-toggle-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 2px dashed var(--color-border);
      border-radius: var(--wobbly);
      padding: 2px 8px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--fg-lead);
    }
    .password-toggle-btn:hover {
      background-color: var(--bg-muted);
    }

    .btn-auth-submit {
      width: 100%;
      margin-top: 12px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 1.1rem;
      opacity: 0.8;
    }

    .auth-footer a {
      color: var(--accent-blue);
      text-decoration: underline;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <!-- Floating Header -->
  <div class="nav-wrapper">
    <nav>
      <a class="nav-logo" href="/">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
        </svg>
        <span>Brain Organizer</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="/" class="nav-link">Home</a>
      </div>
    </nav>
  </div>

  <div class="nav-spacer"></div>

  <!-- Clipboard Auth Sheet -->
  <div class="auth-wrap">
    <div class="auth-clipboard">
      
      <div class="auth-header">
        <h2>Clipboard Log</h2>
        <p>Align user node profiles</p>
      </div>

      <!-- Tab Switch toggler -->
      <div class="tab-row">
        <button class="tab-btn active" id="tabLogin" onclick="switchMode('login')">Sign In</button>
        <button class="tab-btn" id="tabRegister" onclick="switchMode('register')">New Account</button>
      </div>

      <!-- SIGN IN FORM -->
      <div class="auth-form active" id="loginForm">
        <div class="input-wrap">
          <label for="loginEmail">Email Address</label>
          <div class="input-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="input-icon-left" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-lead);pointer-events:none;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
            <input id="loginEmail" class="input" type="email" placeholder="you@example.com" autocomplete="email">
          </div>
        </div>

        <div class="input-wrap">
          <label for="loginPassword">Password</label>
          <div class="input-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="input-icon-left" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-lead);pointer-events:none;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            <input id="loginPassword" class="input" type="password" placeholder="Your password" autocomplete="current-password">
            <button class="password-toggle-btn" onclick="togglePwd('loginPassword', this)">Show</button>
          </div>
        </div>

        <button class="btn btn-auth-submit" id="loginBtn" onclick="login()">
          <span id="loginBtnText">Sign In</span>
        </button>

        <div class="auth-footer">
          New here? <a href="javascript:void(0)" onclick="switchMode('register')">Create a node</a>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div class="auth-form" id="registerForm">
        <div class="input-wrap">
          <label for="regUsername">Username</label>
          <div class="input-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="input-icon-left" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-lead);pointer-events:none;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
            <input id="regUsername" class="input" placeholder="Your username" autocomplete="name">
          </div>
        </div>

        <div class="input-wrap">
          <label for="regEmail">Email Address</label>
          <div class="input-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="input-icon-left" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-lead);pointer-events:none;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
            <input id="regEmail" class="input" type="email" placeholder="you@example.com" autocomplete="email">
          </div>
        </div>

        <div class="input-wrap">
          <label for="regPhone">Phone Number</label>
          <div class="input-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="input-icon-left" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-lead);pointer-events:none;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.824-1.802-5.14-4.118-6.944-6.944l1.293-.97c.362-.272.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/>
            </svg>
            <input id="regPhone" class="input" placeholder="Phone Number">
          </div>
        </div>

        <div class="input-wrap">
          <label for="regPassword">Password</label>
          <div class="input-icon-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="input-icon-left" style="width:18px;height:18px;position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg-lead);pointer-events:none;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            <input id="regPassword" class="input" type="password" placeholder="Create a password" autocomplete="new-password">
            <button class="password-toggle-btn" onclick="togglePwd('regPassword', this)">Show</button>
          </div>
        </div>

        <button class="btn btn-auth-submit" id="regBtn" onclick="register()">
          <span id="regBtnText">Register Node</span>
        </button>

        <div class="auth-footer">
          Already registered? <a href="javascript:void(0)" onclick="switchMode('login')">Sign in here</a>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/script.js"></script>
  <script>
    buildNavbar('auth');

    function switchMode(mode) {
      const isLogin = mode === 'login';
      document.getElementById('loginForm').classList.toggle('active', isLogin);
      document.getElementById('registerForm').classList.toggle('active', !isLogin);
      document.getElementById('tabLogin').classList.toggle('active', isLogin);
      document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    }

    function togglePwd(id, btnEl) {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btnEl.textContent = isHidden ? 'Hide' : 'Show';
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!email || !password) { toast('Please complete all form inputs.', 'error'); return; }

      const btn = document.getElementById('loginBtn');
      const txt = document.getElementById('loginBtnText');
      btn.disabled = true;
      txt.textContent = 'Connecting...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.status === 'success') {
          localStorage.setItem('user', JSON.stringify(data.user));
          toast('Authorized connection verified! Hello, ' + data.user.username + '.', 'success');
          setTimeout(() => location.href = '/', 900);
        } else {
          toast(data.message || 'Authentication error.', 'error');
          btn.disabled = false;
          txt.textContent = 'Sign In';
        }
      } catch {
        toast('Notebook index network timeout.', 'error');
        btn.disabled = false;
        txt.textContent = 'Sign In';
      }
    }

    async function register() {
      const username = document.getElementById('regUsername').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      
      if (!username || !email || !phone || !password) {
        toast('All fields must be filled.', 'error');
        return;
      }

      const btn = document.getElementById('regBtn');
      const txt = document.getElementById('regBtnText');
      btn.disabled = true;
      txt.textContent = 'Registering...';

      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, email, phone, password })
        });
        const data = await res.json();
        if (data.status === 'success') {
          toast('Node registered! Proceeding to Sign In...', 'success');
          setTimeout(() => {
            switchMode('login');
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').focus();
          }, 800);
        } else {
          toast(data.message || 'Could not register node.', 'error');
        }
      } catch {
        toast('Interference registering node.', 'error');
      }
      btn.disabled = false;
      txt.textContent = 'Register Node';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const isLogin = document.getElementById('loginForm').classList.contains('active');
      if (isLogin) login(); else register();
    });
  </script>
</body>
</html>
